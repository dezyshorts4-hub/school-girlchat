<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anime Live2D Qiz</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(to bottom, #ffe4e1, #d8b4ff);
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    #waifu-container {
      position: fixed;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      width: min(320px, 90vw);
      height: min(550px, 80vh);
      z-index: 999;
      pointer-events: none;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }

    #waifu {
      width: 100%;
      height: 100%;
      pointer-events: auto;
      position: relative;
    }

    #speech-bubble {
      position: absolute;
      top: -140px;
      left: 50%;
      transform: translateX(-50%);
      background: #fff;
      color: #333;
      padding: 15px 22px;
      border-radius: 25px;
      font-size: 17px;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.25);
      max-width: 320px;
      text-align: center;
      white-space: normal;
      opacity: 0;
      transition: all 0.4s ease;
      pointer-events: none;
      border: 4px solid #ff9ecd;
      z-index: 1000;
    }

    #speech-bubble::after {
      content: '';
      position: absolute;
      bottom: -15px;
      left: 50%;
      transform: translateX(-50%);
      border-left: 12px solid transparent;
      border-right: 12px solid transparent;
      border-top: 15px solid #fff;
    }

    #speech-bubble.show {
      opacity: 1;
      top: -160px;
    }

    @media (max-width: 600px) {
      #waifu-container {
        width: min(240px, 92vw);
        height: min(420px, 72vh);
      }

      #speech-bubble {
        max-width: 220px;
        font-size: 14px;
        padding: 12px 16px;
        top: -120px;
      }

      #speech-bubble.show {
        top: -140px;
      }
    }
  </style>
</head>
<body>

  <div id="waifu-container">
    <div id="waifu"></div>
    <div id="speech-bubble"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/live2d-widget@3.1.4/lib/L2Dwidget.min.js"></script>

  <script>
    L2Dwidget.init({
      model: {
        jsonPath: "https://cdn.jsdelivr.net/gh/evrstr/live2d-widget-models/live2d_evrstr/shizuku/model.json"
      },
      display: {
        position: "right",
        width: 300,
        height: 550,
        hOffset: 0,
        vOffset: 0
      },
      mobile: {
        show: true,
        scale: 0.9
      },
      react: {
        opacityDefault: 0.95,
        opacityOnHover: 0.25
      }
    });

    const messages = [
      "Salom! 😊 Menga tegsangiz xursand bo‘laman~",
      "Boshimga bos! ✨",
      "Qanday kuningiz o‘tyapti?",
      "Yana bos, boshqa animatsiya chiqadi!",
      "Sizga yoqyapmanmi? ❤️",
      "Qo‘limga tegsangiz qizargan bo‘laman~",
      "Rahmat, meni bosganingiz uchun!",
      "Keling, suhbatlashamiz!"
    ];

    const bubble = document.getElementById('speech-bubble');

    function showSpeech() {
      const randomMsg = messages[Math.floor(Math.random() * messages.length)];
      bubble.textContent = randomMsg;
      bubble.classList.add('show');

      setTimeout(() => {
        bubble.classList.remove('show');
      }, 4500);
    }

    function centerLive2D() {
      const targets = [
        '#waifu',
        '#live2d-widget',
        '#live2d-widget canvas',
        '#live2d-widget iframe',
        'canvas'
      ];

      targets.forEach(selector => {
        document.querySelectorAll(selector).forEach(el => {
          el.style.position = 'fixed';
          el.style.left = '50%';
          el.style.bottom = '0px';
          el.style.transform = 'translateX(-50%)';
          el.style.zIndex = '999';
        });
      });

      const waifuContainer = document.getElementById('waifu-container');
      if (waifuContainer) {
        waifuContainer.style.left = '50%';
        waifuContainer.style.bottom = '0px';
        waifuContainer.style.transform = 'translateX(-50%)';
      }
    }

    const waifuDiv = document.getElementById('waifu');
    waifuDiv.addEventListener('click', showSpeech);
    waifuDiv.addEventListener('touchstart', (e) => {
      e.preventDefault();
      showSpeech();
    });

    window.addEventListener('resize', centerLive2D);
    window.addEventListener('load', () => {
      setTimeout(centerLive2D, 1200);
      setTimeout(centerLive2D, 2500);
      setTimeout(centerLive2D, 4000);
    });
  </script>
</body>
</html>
