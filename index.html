<!-- =========================
BAXTI VELO - SIMPLE FRONTEND
Includes: index.html + savat.html (in one file for simplicity)
========================= -->

<!-- =========================
INDEX PAGE
========================= -->
<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Baxti Velo</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

    body{
      background:rgba(0,0,0,0.9);
      color:white;
    }

    /* NAVBAR */
    .navbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:15px 20px;
      background:#111;
      position:sticky;
      top:0;
    }

    .logo{
      font-size:20px;
      font-weight:bold;
    }

    .logo span.baqti{
      color:gold;
      font-size:18px;
    }

    .logo span.velo{
      color:white;
      font-size:24px;
    }

    .nav-links{
      display:flex;
      gap:15px;
    }

    .nav-item{
      cursor:pointer;
    }

    .dropdown{
      position:absolute;
      background:#222;
      padding:10px;
      display:none;
      flex-direction:column;
      max-height:300px;
      overflow:auto;
      z-index:10;
    }

    .nav-item:hover .dropdown{
      display:flex;
    }

    /* SEARCH */
    .search{
      background:#222;
      border:none;
      padding:8px;
      color:white;
      border-radius:5px;
    }

    /* PRODUCTS */
    .container{
      padding:20px;
    }

    .section-title{
      margin:15px 0;
      font-size:18px;
      border-left:3px solid gold;
      padding-left:10px;
    }

    .products{
      display:flex;
      overflow-x:auto;
      gap:15px;
      padding-bottom:10px;
    }

    .card{
      min-width:200px;
      background:#1c1c1c;
      padding:10px;
      border-radius:10px;
    }

    .img{
      width:100%;
      height:120px;
      background:#333;
      border-radius:8px;
    }

    .price-old{
      text-decoration:line-through;
      color:gray;
      font-size:12px;
    }

    .price-new{
      color:gold;
      font-weight:bold;
    }

    .btn{
      margin-top:5px;
      padding:5px;
      width:100%;
      background:gold;
      border:none;
      cursor:pointer;
    }

  </style>
</head>
<body>

<div class="navbar">
  <div class="logo">
    <span class="baqti">Baxti</span>
    <span class="velo"> Velo</span>
  </div>

  <input class="search" placeholder="Qidiruv..." onkeyup="searchProducts(this.value)"/>

  <div class="nav-links">

    <div class="nav-item">
      Velo-qismlar
      <div class="dropdown" id="veloMenu">
        <div onclick="scrollToId('rama')">Rama</div>
        <div onclick="scrollToId('rul')">Rul</div>
        <div onclick="scrollToId('disk')">Disk</div>
        <div onclick="scrollToId('zanjir')">Zanjir</div>
      </div>
    </div>

    <div class="nav-item">
      Skuter qismlari
      <div class="dropdown">
        <div onclick="scrollToId('motor')">Motor</div>
        <div onclick="scrollToId('akum')">Akkumulyator</div>
        <div onclick="scrollToId('ekran')">Ekran</div>
      </div>
    </div>

    <div class="nav-item" onclick="goCart()">Biz bilan bog'lanish</div>

  </div>
</div>

<div class="container">

  <div class="section-title" id="rama">Rama</div>
  <div class="products">

    <div class="card">
      <div class="img"></div>
      <div>Rama Nikil</div>
      <div class="price-old">360 000 so'm</div>
      <div class="price-new">320 000 so'm</div>
      <button class="btn" onclick="addCart('Rama Nikil')">Savatga</button>
    </div>

  </div>

  <div class="section-title" id="motor">Motor</div>
  <div class="products">
    <div class="card">
      <div class="img"></div>
      <div>Skuter Motor</div>
      <div class="price-new">1 200 000 so'm</div>
      <button class="btn" onclick="addCart('Motor')">Savatga</button>
    </div>
  </div>

</div>

<script>
let cart = [];

function addCart(item){
  cart.push(item);
  alert(item + " savatga qo'shildi");
  localStorage.setItem("cart", JSON.stringify(cart));
}

function goCart(){
  window.location.href = "savat.html";
}

function scrollToId(id){
  document.getElementById(id).scrollIntoView({behavior:"smooth"});
}

function searchProducts(value){
  alert("Qidiruv: " + value);
}
</script>

</body>
</html>


<!-- =========================
SAVAT PAGE (savat.html)
========================= -->

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Savat</title>
<style>
body{background:#111;color:white;font-family:Arial;padding:20px;}
.item{background:#222;padding:10px;margin:10px 0;border-radius:8px;}
</style>
</head>
<body>

<h2>Savat</h2>
<div id="list"></div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let list = document.getElementById("list");

cart.forEach(i=>{
  let div = document.createElement("div");
  div.className="item";
  div.innerText=i;
  list.appendChild(div);
});
</script>

</body>
</html>
